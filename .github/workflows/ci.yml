name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          ENVIRONMENT=test
          APP_NAME=CRM Hotel Platform
          APP_VERSION=1.0.0
          DEBUG=false
          LOG_LEVEL=INFO
          LOG_JSON=false
          REQUEST_ID_HEADER=X-Request-ID
          POSTGRES_USER=crm_user
          POSTGRES_PASSWORD=crm_password
          POSTGRES_DB=crm_db
          DATABASE_URL=postgresql+asyncpg://crm_user:crm_password@postgres:5432/crm_db
          DATABASE_SYNC_URL=postgresql://crm_user:crm_password@postgres:5432/crm_db
          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/1
          SECRET_KEY=ci-secret-key-with-at-least-32-characters
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          REFRESH_TOKEN_EXPIRE_DAYS=30
          COOKIE_SECURE=false
          COOKIE_SAMESITE=lax
          ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
          UPLOAD_DIR=/app/uploads
          MAX_FILE_SIZE=10485760
          NEXT_PUBLIC_API_URL=http://localhost:8888
          NEXTAUTH_URL=http://localhost:3000
          NEXTAUTH_SECRET=ci-nextauth-secret-with-at-least-32-characters
          ADMIN_EMAIL=admin@crm.local
          ADMIN_PASSWORD=Admin@1234
          ADMIN_NAME=System Admin
          SEED_DEMO_DATA=false
          DEMO_USER_PASSWORD=Demo@1234
          EOF

      - name: Start PostgreSQL and Redis
        run: docker compose up -d postgres redis

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          for attempt in {1..30}; do
            if docker compose exec -T postgres pg_isready -U crm_user -d postgres >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs postgres
          exit 1

      - name: Ensure the test database exists
        shell: bash
        run: |
          if ! docker compose exec -T postgres psql -U crm_user -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='crm_test_db'" | grep -q 1; then
            docker compose exec -T postgres psql -U crm_user -d postgres -c "CREATE DATABASE crm_test_db;"
          fi

      - name: Build and start the backend
        run: docker compose up -d --build backend

      - name: Wait for backend health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8888/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs backend
          exit 1

      - name: Run backend test suite
        run: docker compose exec -T backend pytest

      - name: Tear down backend test stack
        if: always()
        run: docker compose down -v --remove-orphans

  smoke-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create CI environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          ENVIRONMENT=test
          APP_NAME=CRM Hotel Platform
          APP_VERSION=1.0.0
          DEBUG=false
          LOG_LEVEL=INFO
          LOG_JSON=false
          REQUEST_ID_HEADER=X-Request-ID
          POSTGRES_USER=crm_user
          POSTGRES_PASSWORD=crm_password
          POSTGRES_DB=crm_db
          DATABASE_URL=postgresql+asyncpg://crm_user:crm_password@postgres:5432/crm_db
          DATABASE_SYNC_URL=postgresql://crm_user:crm_password@postgres:5432/crm_db
          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/1
          SECRET_KEY=ci-secret-key-with-at-least-32-characters
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          REFRESH_TOKEN_EXPIRE_DAYS=30
          COOKIE_SECURE=false
          COOKIE_SAMESITE=lax
          ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
          UPLOAD_DIR=/app/uploads
          MAX_FILE_SIZE=10485760
          NEXT_PUBLIC_API_URL=http://localhost:8888
          NEXTAUTH_URL=http://localhost:3000
          NEXTAUTH_SECRET=ci-nextauth-secret-with-at-least-32-characters
          ADMIN_EMAIL=admin@crm.local
          ADMIN_PASSWORD=Admin@1234
          ADMIN_NAME=System Admin
          SEED_DEMO_DATA=false
          DEMO_USER_PASSWORD=Demo@1234
          EOF

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build and start application stack
        run: docker compose up -d --build postgres redis backend frontend

      - name: Wait for backend health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8888/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs backend
          exit 1

      - name: Seed demo data
        run: docker compose exec -T backend python -m app.scripts.seed_demo_data

      - name: Wait for frontend login page
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs frontend
          exit 1

      - name: Run smoke test suite
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:smoke

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Tear down smoke stack
        if: always()
        run: docker compose down -v --remove-orphans
