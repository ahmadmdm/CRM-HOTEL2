services:
  postgres:
    restart: unless-stopped
    ports: !override []

  redis:
    restart: unless-stopped
    ports: !override []

  backend:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:3811:8000"
    volumes: !override
      - uploads_data:/app/uploads

  celery-worker:
    restart: unless-stopped
    volumes: !override
      - uploads_data:/app/uploads

  celery-beat:
    restart: unless-stopped
    volumes: !override []

  frontend:
    restart: unless-stopped
    build:
      args:
        NEXT_PUBLIC_API_URL: https://crm.clo0.net
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports: !override
      - "127.0.0.1:3810:3000"
    volumes: !override []